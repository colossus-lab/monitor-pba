<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="url(#bg)" />
  
  <!-- Estilo Glass Morphico para contención -->
  <rect x="14" y="14" width="72" height="72" rx="16" fill="#1e293b" fill-opacity="0.5" stroke="#334155" stroke-width="2"/>
  
  <!-- Columnas del Chart -->
  <rect x="26" y="54" width="12" height="20" rx="4" fill="url(#bar)" />
  <rect x="44" y="38" width="12" height="36" rx="4" fill="url(#bar)" />
  <rect x="62" y="24" width="12" height="50" rx="4" fill="url(#bar)" />
  
  <!-- Puntito brillante como indicador o Pin -->
  <circle cx="68" cy="24" r="4" fill="#38bdf8" />
</svg>